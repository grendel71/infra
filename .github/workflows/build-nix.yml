name: Build NixOS & Push to S3 Cache

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.configuration }}
    runs-on: self-hosted
    strategy:
      matrix:
        configuration: [blau-pc, blau-laptop]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Build NixOS configuration
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel \
            --no-link \
            --print-out-paths \
            --extra-substituters "s3://${NIX_CACHE_BUCKET}?endpoint=${S3_ENDPOINT}&scheme=http" \
            --extra-trusted-substituters "s3://${NIX_CACHE_BUCKET}?endpoint=${S3_ENDPOINT}&scheme=http" \
            -L

      - name: Push to S3 binary cache
        run: |
          outpath=$(nix build \
            .#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel \
            --no-link \
            --print-out-paths)
          nix copy --to "s3://${NIX_CACHE_BUCKET}?endpoint=${S3_ENDPOINT}&scheme=http" "$outpath"
